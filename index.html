<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bright Cuts · Michael Makes It Work</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bright Cuts">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141414; --panel: #1c1c1c; --panel2: #232323; --panel3: #2a2a2a;
      --border: #323232; --border2: #3d3d3d;
      --text: #ededed; --muted: #8a8a8a; --muted2: #5e5e5e;
      --accent: #e8a838; --accent-soft: rgba(232,168,56,0.15);
      --accent2: #4a9eff;
      --money: #6ec77e;
      --danger: #e05252; --success: #52c47e; --warn: #e8a838;
      --cut: #ff6b35;
      --shadow: 0 4px 18px rgba(0,0,0,0.4);
    }
    /* Light theme overrides */
    [data-theme="light"] {
      --bg: #f5f1e8;
      --panel: #ffffff;
      --panel2: #f9f6ef;
      --panel3: #ede7d8;
      --border: #d8d0c0;
      --border2: #b8b0a0;
      --text: #1a1814;
      --muted: #5a5448;
      --muted2: #8a8478;
      --accent: #c47a1a;
      --accent-soft: rgba(196,122,26,0.10);
      --accent2: #2a78cc;
      --money: #2e7c46;
      --shadow: 0 3px 14px rgba(50,40,20,0.10);
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; font-size: 13px; min-height: 100vh; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01", "cv01"; transition: background-color 0.2s, color 0.2s; }
    /* Light-mode tweaks for specific surfaces that look weird with simple variable swaps */
    [data-theme="light"] .diagram { background: #f5ede0; border-color: #d8cdb5; }
    [data-theme="light"] .quiz-explain { background: #faf6ec; }
    [data-theme="light"] .finished-preview { background: linear-gradient(135deg, #fbf7ec 0%, #f5ede0 100%); }
    [data-theme="light"] .finished-preview::before { display: none; }
    [data-theme="light"] .preview-svg-wrap svg { filter: drop-shadow(0 4px 14px rgba(60,40,10,0.15)); }
    [data-theme="light"] .home-tile-stat { background: linear-gradient(135deg, #faf6ec 0%, #f3ebd8 100%); }
    [data-theme="light"] .home-tile:hover { box-shadow: 0 6px 22px rgba(60,40,10,0.12); }
    [data-theme="light"] .lib-search, [data-theme="light"] .species-name, [data-theme="light"] .field input, [data-theme="light"] .field select, [data-theme="light"] .species-price, [data-theme="light"] .strip-row input, [data-theme="light"] .strip-row select { background: #fcfaf3; }
    [data-theme="light"] .wood-card:hover { box-shadow: 0 6px 20px rgba(60,40,10,0.12); }
    [data-theme="light"] .scard:hover, [data-theme="light"] .step-card:hover, [data-theme="light"] .home-tile:hover { box-shadow: 0 4px 16px rgba(60,40,10,0.10); }
    [data-theme="light"] .preset-btn:hover, [data-theme="light"] .seg-btn:hover:not(.active) { background: #f0eada; }
    [data-theme="light"] .swatch-input { background: white; }
    [data-theme="light"] header { box-shadow: 0 1px 0 rgba(0,0,0,0.04); }
    [data-theme="light"] .input-col { background: #faf6ec; }
    [data-theme="light"] .brand-text h1 { color: #1a1814; }

    /* HEADER + BRAND */
    header { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 18px; background: var(--panel); }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-logo { width: 34px; height: 34px; flex-shrink: 0; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.05; }
    .brand-text h1 { font-size: 15px; font-weight: 800; letter-spacing: 0.1px; color: var(--text); }
    .brand-sub { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.7px; text-transform: uppercase; font-weight: 600; }
    .tab-row { display: flex; gap: 2px; margin-left: 6px; }
    .tab { padding: 5px 12px; border-radius: 6px; border: 1px solid transparent; background: none; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.12s; }
    .tab.active { background: var(--panel2); border-color: var(--border); color: var(--text); }
    .tab:hover:not(.active) { color: var(--text); }
    .header-spacer { flex: 1; }
    .header-action { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: all 0.12s; }
    .header-action:hover { color: var(--text); border-color: var(--muted); }
    .live-indicator { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--success); margin-right: 5px; vertical-align: middle; box-shadow: 0 0 6px var(--success); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* LAYOUT */
    .workspace { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 45px); }
    .input-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--panel); }
    .input-body { overflow-y: auto; flex: 1; padding: 14px; }
    .output-col { overflow-y: auto; padding: 20px 24px; }
    .section { margin-bottom: 14px; }
    .section-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; display: flex; align-items: center; gap: 8px; }
    .section-label .hint { font-weight: 400; color: var(--muted2); text-transform: none; letter-spacing: 0; font-size: 10px; }

    /* Standard/Custom UI mode */
    [data-ui-mode="standard"] .custom-only,
    [data-ui-mode="standard"] .standard-hide { display: none !important; }
    [data-ui-mode="custom"] .standard-only { display: none !important; }
    /* TOGGLES */
    .seg-toggle { display: grid; gap: 3px; }
    .seg-toggle.cols2 { grid-template-columns: 1fr 1fr; }
    .seg-toggle.cols3 { grid-template-columns: 1fr 1fr 1fr; }
    .seg-toggle.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .seg-btn { padding: 6px 6px; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 11px; text-align: center; transition: all 0.12s; font-weight: 500; }
    .seg-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .seg-btn:hover:not(.active) { color: var(--text); border-color: var(--border2); }

    /* PRESETS */
    .preset-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .preset-btn { padding: 7px 4px; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 10px; cursor: pointer; transition: all 0.12s; text-align: center; line-height: 1.3; }
    .preset-btn:hover { color: var(--text); border-color: var(--border2); background: var(--panel3); }
    .preset-btn .ttl { font-weight: 600; color: var(--text); display: block; font-size: 11px; }
    .preset-btn .sub { font-size: 9.5px; color: var(--muted2); font-variant-numeric: tabular-nums; }

    /* FIELDS */
    .field-grid { display: grid; gap: 6px; }
    .field-grid.cols2 { grid-template-columns: 1fr 1fr; }
    .field-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 10px; color: var(--muted); font-weight: 500; }
    .field input, .field select { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 6px 8px; font-size: 13px; width: 100%; font-variant-numeric: tabular-nums; transition: border-color 0.1s; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .field select { cursor: pointer; }

    /* SPECIES + PRICES */
    .species-row { display: grid; grid-template-columns: 24px 1fr 56px 22px 22px; gap: 5px; align-items: center; margin-bottom: 5px; }
    .swatch-input { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border); padding: 0; cursor: pointer; background: none; }
    .swatch-input::-webkit-color-swatch-wrapper { padding: 2px; }
    .swatch-input::-webkit-color-swatch { border-radius: 3px; border: none; }
    .species-name { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 8px; font-size: 12px; min-width: 0; }
    .species-name:focus, .species-price:focus { outline: none; border-color: var(--accent); }
    .species-price { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; color: var(--money); padding: 5px 6px; font-size: 11px; font-variant-numeric: tabular-nums; text-align: right; min-width: 0; }
    .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.12s; padding: 0; }
    .icon-btn:hover { color: var(--danger); border-color: var(--danger); }
    .icon-btn.pick:hover { color: var(--accent); border-color: var(--accent); }
    .add-btn { width: 100%; padding: 6px; background: none; border: 1px dashed var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; font-size: 11px; transition: all 0.12s; }
    .add-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* WOOD PICKER */
    .wood-picker-menu { display: none; margin: 4px 0 8px; background: var(--panel2); border: 1px solid var(--accent); border-radius: 6px; padding: 5px; max-height: 240px; overflow-y: auto; }
    .wood-picker-menu.open { display: block; }
    .wood-option { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .wood-option:hover { background: var(--accent-soft); }
    .wood-option .sw { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
    .wood-option .name { flex: 1; }
    .wood-option .price { color: var(--money); font-size: 11px; font-variant-numeric: tabular-nums; }

    /* STRIP PATTERN (face grain custom layout) */
    .strip-row { display: grid; grid-template-columns: 1fr 70px 22px; gap: 6px; align-items: center; margin-bottom: 4px; }
    .strip-row select { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 6px; font-size: 12px; cursor: pointer; min-width: 0; }
    .strip-row input { background: var(--panel2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 6px; font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }
    .strip-row select:focus, .strip-row input:focus { outline: none; border-color: var(--accent); }
    .strip-total { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 4px 6px; background: var(--panel2); border-radius: 4px; font-variant-numeric: tabular-nums; }
    .strip-total.warn { color: var(--warn); background: rgba(232,168,56,0.08); }
    .strip-total.ok { color: var(--success); }

    /* PLAN BUTTON */
    .plan-btn { margin: 10px 14px 14px; padding: 11px; background: var(--accent); border: none; border-radius: 7px; color: #1a1a1a; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; flex-shrink: 0; letter-spacing: 0.3px; box-shadow: 0 2px 8px rgba(232,168,56,0.2); }
    .plan-btn:hover { opacity: 0.92; box-shadow: 0 3px 12px rgba(232,168,56,0.3); }
    .plan-btn:active { transform: translateY(1px); }

    /* OUTPUT */
    .empty-state { text-align: center; color: var(--muted); padding: 80px 24px; }
    .empty-state .icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }

    /* FINISHED PREVIEW */
    .finished-preview { background: linear-gradient(135deg, #1f1d1a 0%, #181614 100%); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 22px; position: relative; overflow: hidden; box-shadow: var(--shadow); }
    .finished-preview::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 20%, rgba(232,168,56,0.06), transparent 55%); pointer-events: none; }
    .preview-title { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
    .preview-title h2 { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; }
    .preview-title .dims { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .preview-svg-wrap { display: flex; justify-content: center; padding: 4px 0; }
    .preview-svg-wrap svg { max-width: 100%; height: auto; filter: drop-shadow(0 10px 28px rgba(0,0,0,0.55)); }

    /* SUMMARY CARDS */
    .summary-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 18px; }
    .summary-cards.cols6 { grid-template-columns: repeat(6, 1fr); }
    .summary-cards.cols4 { grid-template-columns: repeat(4, 1fr); }
    .scard { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; transition: border-color 0.15s; }
    .scard:hover { border-color: var(--border2); }
    .scard .val { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1.1; font-variant-numeric: tabular-nums; }
    .scard .val.money { color: var(--money); }
    .scard .lbl { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.2px; }

    /* COST BREAKDOWN */
    .cost-breakdown { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 13px 16px; margin-bottom: 22px; }
    .cost-breakdown .ttl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
    .cost-breakdown .ttl .total { color: var(--money); font-size: 15px; letter-spacing: 0.2px; }
    .cost-line { display: grid; grid-template-columns: 14px 1fr auto auto auto; gap: 10px; padding: 5px 0; font-size: 12px; font-variant-numeric: tabular-nums; border-top: 1px solid rgba(255,255,255,0.03); align-items: center; }
    .cost-line:first-of-type { border-top: none; }
    .cost-line .dot { width: 10px; height: 10px; border-radius: 2px; }
    .cost-line .name { color: var(--text); font-weight: 500; }
    .cost-line .bf, .cost-line .rate { color: var(--muted); font-size: 11px; }
    .cost-line .amt { color: var(--money); font-weight: 600; min-width: 56px; text-align: right; }

    /* BANNERS */
    .warn-banner { background: rgba(232,168,56,0.08); border: 1px solid rgba(232,168,56,0.3); border-radius: 8px; padding: 11px 14px; margin-bottom: 16px; font-size: 12px; color: var(--warn); display: flex; align-items: flex-start; gap: 8px; line-height: 1.55; }
    .warn-banner.danger { background: rgba(224,82,82,0.08); border-color: rgba(224,82,82,0.3); color: var(--danger); }
    .warn-banner.info { background: rgba(74,158,255,0.08); border-color: rgba(74,158,255,0.3); color: var(--accent2); }
    .warn-banner .icon { font-size: 14px; line-height: 1.2; }

    /* STEPS */
    .steps-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .copy-btn, .send-btn { background: var(--panel2); border: 1px solid var(--border); color: var(--muted); padding: 5px 11px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: all 0.12s; }
    .copy-btn:hover, .send-btn:hover { color: var(--text); border-color: var(--muted); }
    .send-btn { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.3); color: var(--accent2); font-weight: 600; }
    .send-btn:hover { background: rgba(74,158,255,0.18); border-color: var(--accent2); }
    .step-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.15s; }
    .step-card:hover { border-color: var(--border2); }
    .step-header { display: flex; align-items: flex-start; gap: 11px; padding: 13px 15px 9px; }
    .step-num { background: var(--accent); color: #1a1a1a; font-weight: 700; font-size: 12px; width: 23px; height: 23px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-title { font-weight: 600; font-size: 13px; }
    .step-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.55; }
    .step-body { padding: 0 15px 13px; }
    .measurements { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
    .meas { background: var(--accent-soft); border: 1px solid rgba(232,168,56,0.2); border-radius: 5px; padding: 4px 9px; font-size: 11px; color: var(--text); font-variant-numeric: tabular-nums; }
    .meas strong { color: var(--accent); font-weight: 700; }

    /* PARTS TABLE */
    .parts-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 18px; }
    .parts-table th { text-align: left; padding: 9px 12px; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(0,0,0,0.18); border-bottom: 1px solid var(--border); }
    .parts-table td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); font-variant-numeric: tabular-nums; }
    .parts-table tr:last-child td { border-bottom: none; }
    .parts-table tr:hover td { background: rgba(255,255,255,0.025); }
    .parts-table td.qty { font-weight: 700; color: var(--accent); }
    .parts-table td.name { font-weight: 500; }
    .mat-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .mat-tag.plywood { background: rgba(74,158,255,0.15); color: var(--accent2); }
    .mat-tag.plywood-thin { background: rgba(74,158,255,0.08); color: #7eb3e8; }
    .mat-tag.hardwood { background: rgba(232,168,56,0.15); color: var(--accent); }

    .diagram { background: #15110b; border-radius: 6px; overflow: hidden; border: 1px solid #221a0e; }
    .diagram svg { display: block; width: 100%; height: auto; }

    /* PROJECTS */
    .projects-col { padding: 28px 36px; max-width: 1300px; margin: 0 auto; width: 100%; }
    .proj-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 22px; gap: 16px; flex-wrap: wrap; }
    .proj-header .title h2 { font-size: 26px; font-weight: 800; letter-spacing: 0.2px; margin-bottom: 4px; }
    .proj-header .title p { color: var(--muted); font-size: 13px; max-width: 600px; line-height: 1.5; }
    .proj-add-btn { background: var(--accent); border: none; color: #1a1a1a; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(232,168,56,0.2); transition: opacity 0.15s; }
    .proj-add-btn:hover { opacity: 0.9; }
    .proj-stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .proj-stat { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 100px; }
    .proj-stat .val { font-size: 22px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
    .proj-stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; margin-top: 3px; text-transform: uppercase; }
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .proj-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.15s; }
    .proj-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
    .proj-photo { aspect-ratio: 4/3; background: var(--panel3); display: flex; align-items: center; justify-content: center; color: var(--muted2); font-size: 32px; overflow: hidden; }
    .proj-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .proj-body { padding: 12px 14px; }
    .proj-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
    .proj-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
    .proj-meta .dot-row { display: inline-flex; gap: 3px; }
    .proj-meta .dot-row .d { width: 8px; height: 8px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); }
    .proj-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .proj-tag { font-size: 10px; padding: 2px 7px; border-radius: 9px; background: var(--accent-soft); color: var(--accent); font-weight: 600; letter-spacing: 0.2px; }
    .proj-tag.money { background: rgba(110,199,126,0.15); color: var(--money); }
    .proj-empty { text-align: center; padding: 60px 24px; color: var(--muted); background: var(--panel2); border: 2px dashed var(--border); border-radius: 14px; }
    .proj-empty .icon { font-size: 56px; opacity: 0.4; margin-bottom: 16px; }
    .proj-empty p { font-size: 14px; line-height: 1.6; max-width: 480px; margin: 0 auto; }

    /* Project form */
    .proj-form { background: var(--panel2); border: 1px solid var(--border); border-radius: 14px; padding: 26px 28px; margin-bottom: 22px; }
    .proj-form h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
    .proj-form-row { margin-bottom: 16px; }
    .proj-form-row label.lbl { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    .progress-bar { flex: 1; height: 6px; background: var(--panel2); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .quiz-score-tag { background: var(--panel2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 12px; font-variant-numeric: tabular-nums; }
    .quiz-cat-badge { display: inline-block; background: var(--accent-soft); color: var(--accent); padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
    .quiz-question { font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 24px; color: var(--text); }
    .quiz-options { display: grid; gap: 10px; margin-bottom: 18px; }
    .quiz-option { background: var(--panel); border: 2px solid var(--border); padding: 14px 18px; border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: left; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 12px; line-height: 1.4; }
    .quiz-option:hover:not(:disabled) { border-color: var(--accent); background: rgba(232,168,56,0.04); }
    .quiz-option .opt-letter { width: 26px; height: 26px; border-radius: 50%; background: var(--panel2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; color: var(--muted); }
    .quiz-option.correct { border-color: var(--success); background: rgba(82,196,126,0.08); }
    .quiz-option.correct .opt-letter { background: var(--success); color: white; }
    .quiz-option.incorrect { border-color: var(--danger); background: rgba(224,82,82,0.08); }
    .quiz-option.incorrect .opt-letter { background: var(--danger); color: white; }
    .quiz-option:disabled { cursor: default; opacity: 0.7; }
    .quiz-option.correct, .quiz-option.incorrect { opacity: 1; }
    .quiz-explain { background: var(--panel); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 4px; font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 18px; }
    .quiz-explain strong { color: var(--accent); }
    .quiz-next { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #1a1a1a; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }
    .quiz-next:hover { opacity: 0.9; }
    /* Results */
    .result-score { font-size: 56px; font-weight: 800; color: var(--accent); text-align: center; line-height: 1; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
    .result-pct { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 4px; }
    .result-rank { text-align: center; font-size: 16px; font-weight: 700; margin-bottom: 24px; }
    .result-bd { display: grid; gap: 8px; margin-bottom: 22px; }
    .result-cat-line { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 10px 12px; background: var(--panel); border-radius: 7px; font-size: 13px; }
    .result-cat-bar { height: 4px; background: var(--panel2); border-radius: 2px; overflow: hidden; flex: 1; min-width: 100px; }
    .result-cat-bar div { height: 100%; background: var(--accent); }
    .review-section { margin-top: 18px; }
    .review-q { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; }
    .review-q .q { font-weight: 600; margin-bottom: 6px; }
    .review-q .ans { color: var(--muted); font-size: 12px; }
    .review-q .ans .yours { color: var(--danger); }
    .review-q .ans .correct { color: var(--success); }
    .acad-restart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .acad-restart-row button { padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }
    .acad-again { background: var(--accent); color: #1a1a1a; }
    .acad-change { background: var(--panel); border: 1px solid var(--border); color: var(--text); }

    .opt-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 7px; padding: 10px; margin-bottom: 7px; }
    .opt-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .opt-card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 5px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

    /* ═══════════════════════ MOBILE RESPONSIVE ═══════════════════════ */
    @media (max-width: 820px) {
      /* Header stacks: brand on top, tabs scroll horizontally below */
      header { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
      .brand { flex: 1 1 auto; }
      .brand-text h1 { font-size: 13px; }
      .brand-sub { font-size: 8px; }
      .tab-row { order: 3; flex: 1 1 100%; overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
      .tab-row .tab { white-space: nowrap; flex-shrink: 0; }
      .header-spacer { display: none; }
      .header-action { font-size: 10px; padding: 4px 8px; }
      header > span:has(.live-indicator) { font-size: 10px; }

      /* Workspace stacks: input on top, output below */
      .workspace { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 88px); }
      .input-col { border-right: none; border-bottom: 1px solid var(--border); max-height: none; }
      .input-body { max-height: 70vh; }

      /* Summary cards: 2 columns instead of 4/5/6 */
      .summary-cards, .summary-cards.cols4, .summary-cards.cols5, .summary-cards.cols6 { grid-template-columns: repeat(2, 1fr); }
      .scard .val { font-size: 15px; }
      .scard .lbl { font-size: 9px; }

      /* Wood library + projects + supplies: single column */
      .wood-grid { grid-template-columns: 1fr; }
      .proj-grid, .sup-grid, .home-tile-grid { grid-template-columns: 1fr; }

      /* Form grids: stack vertically */
      .field-grid.cols2, .field-grid.cols3 { grid-template-columns: 1fr; }
      .proj-form-grid.cols2, .proj-form-grid.cols3, .proj-form-grid.cols4 { grid-template-columns: 1fr; }
      .sup-form .grid.cols2, .sup-form .grid.cols3 { grid-template-columns: 1fr; }
      .shop-grid { grid-template-columns: 1fr; }

      /* Padding adjustments */
      .input-body { padding: 10px; }
      .output-col { padding: 14px 12px; }
      .library-col, .shop-col, .academy-col, .projects-col, .home-col { padding: 16px 12px; }

      /* Home tiles */
      .home-tile { padding: 16px; }
      .home-title { font-size: 28px; }
      .home-tagline { font-size: 13px; }
      .home-hero-logo { width: 50px; height: 50px; }

      /* Library filter row wraps cleanly */
      .lib-filter-row, .shop-filter-row { gap: 4px; }
      .lib-filter { padding: 5px 10px; font-size: 11px; }
      .lib-search { flex: 1 1 100%; max-width: none; margin-left: 0; }

      /* Smaller previews */
      .finished-preview { padding: 14px; }
      .preview-svg-wrap svg { max-width: 100%; }
      .preview-title h2 { font-size: 13px; }
      .preview-title .dims { font-size: 11px; }
      .preview-title { flex-wrap: wrap; gap: 4px; }

      /* Quiz tweaks */
      .academy-header h2 { font-size: 22px; }
      .quiz-question { font-size: 17px; }
      .cat-grid { grid-template-columns: 1fr 1fr; }

      /* Shop matrix table - stack rows */
      .shop-matrix-row, .shop-matrix-head { grid-template-columns: 1fr; gap: 4px; padding: 8px 0; }
      .shop-matrix-head { display: none; }
      .shop-matrix-row .tool { font-size: 12px; }
      .shop-matrix-row .why { font-size: 11px; }

      /* Project detail layout */
      .proj-detail-grid { grid-template-columns: 1fr; gap: 18px; }
      .proj-detail-row { grid-template-columns: 100px 1fr; font-size: 12px; }

      /* Supplies card */
      .sup-card { grid-template-columns: 50px 1fr; }
      .sup-card .photo { width: 50px; height: 50px; }

      /* Cost cards readable on mobile */
      .cost-line { grid-template-columns: 14px 1fr auto auto; gap: 8px; font-size: 11px; }
      .cost-line .rate { display: none; }
    }
    @media (max-width: 480px) {
      /* Even tighter on phones */
      .summary-cards, .summary-cards.cols4, .summary-cards.cols5, .summary-cards.cols6 { grid-template-columns: 1fr 1fr; }
      .home-title { font-size: 24px; }
      .preset-row { grid-template-columns: 1fr 1fr; }
      .cat-grid { grid-template-columns: 1fr; }
      .brand-text h1 { font-size: 12px; }
      .acad-restart-row { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white !important; color: black !important; }
      header, .input-col { display: none !important; }
      .workspace { display: block !important; height: auto !important; }
      .output-col { padding: 0 !important; overflow: visible !important; }
      .scard, .step-card, .finished-preview, .parts-table, .cost-breakdown { break-inside: avoid; background: white !important; border-color: #ccc !important; box-shadow: none !important; }
      .scard .val, .step-num, .meas strong, .parts-table td.qty { color: #c47a1a !important; }
      .scard .val.money, .cost-line .amt, .cost-breakdown .ttl .total { color: #2e7c46 !important; }
      .step-desc, .scard .lbl, .preview-title .dims { color: #555 !important; }
      .step-title, .preview-title h2, .cost-line .name { color: black !important; }
      .meas { background: #fff7e8 !important; border-color: #e8c896 !important; color: black !important; }
      .finished-preview::before { display: none !important; }
      .live-indicator { display: none !important; }
      .wood-swatch, .swatch-input, .cost-line .dot, .mat-tag { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .wood-swatch, .cost-line .dot { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  </style>
